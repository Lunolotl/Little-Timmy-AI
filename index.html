<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Little Timmy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .chat-container {
      width: 300px;
      border: 1px solid #ccc;
      padding: 10px;
    }

    #chat-box {
      height: 200px;
      overflow-y: auto;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .input-area {
      display: flex;
      gap: 5px;
    }

    #chat-box div {
      transition: opacity 1s;
    }
  </style>
</head>

<body>

<h1>This is Little Timmy (version 1.0)</h1>
<p>The most ragebaitable AI known to man-kind</p>

<div class="chat-container">
  <div id="chat-box"></div>

  <div class="input-area">
    <input id="user-input" placeholder="Send message" />
    <button id="send-btn">Send</button>
  </div>
</div>

<h6>
  *Note: Little Timmy is an AI chatbot and not a real person. He is intentionally annoying, he cannot generate media and doesn't understand acronyms, thank you!!
</h6>

<script>
  const sendBtn = document.getElementById("send-btn");
  const userInput = document.getElementById("user-input");
  const chatBox = document.getElementById("chat-box");

  const moods = ["bratty", "lazy", "angry"];
  let mood = random(moods);

  function random(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

 
  function detectIntent(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("hello") || msg.includes("hi")) return "greet";
    if (msg.includes("how are you")) return "status";
    if (msg.includes("your name")) return "name";
    if (msg.includes("help")) return "help";
    if (msg.includes("love") || msg.includes("like")) return "emotion";

    return "unknown";
  }

  function maybeChangeMood() {
    if (Math.random() < 0.3) {
      mood = random(moods);
    }
  }

  function generateResponse(message) {
    const intent = detectIntent(message);

    const responses = {
      greet: [
        "ugh... hi.",
        "yeah? what.",
        "oh it's YOU."
      ],
      status: [
        "bad.",
        "why do you care?",
        "I'm bored."
      ],
      name: [
        "I'm Little Timmy.",
        "you already know that.",
        "stop asking."
      ],
      help: [
        "no.",
        "figure it out.",
        "I'm not helping."
      ],
      emotion: [
        "that's weird.",
        "stop it.",
        "ew."
      ],
      unknown: [
        "what?",
        "huh?",
        "that made no sense.",
        "you're confusing me."
      ]
    };

    let reply = random(responses[intent]);

    if (mood === "angry") reply = reply.toUpperCase() + "!!!";
    if (mood === "lazy") reply = "..." + reply;
    if (mood === "bratty") reply = reply + " 🙄";

    return "Little Timmy: " + reply;
  }

  function addMessage(text) {
    const div = document.createElement("div");
    div.textContent = text;
    chatBox.appendChild(div);

    setTimeout(() => {
      div.style.opacity = "0";
      setTimeout(() => div.remove(), 1000);
    }, 15000);
  }

  function sendMessage() {
    const msg = userInput.value.trim();
    if (!msg) return;

    addMessage("You: " + msg);
    addMessage(generateResponse(msg));

    userInput.value = "";

    maybeChangeMood();
  }

  sendBtn.addEventListener("click", sendMessage);

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  addMessage("Little Timmy is online... unfortunately.");
</script>

</body>
</html>
